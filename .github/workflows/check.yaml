name: Check

on:
  push:
    branches:
      - main
      - 'renovate/**'
    paths:
      - '*.json5?'

      - '.github/workflows/check.yaml'

  pull_request:
    branches:
      - main
    paths:
      - '*.json5?'

      - '.github/workflows/check.yaml'

  workflow_call:
  workflow_dispatch:

  schedule:
    # Also run the check every month.
    - cron: '0 0 1 * *'

jobs:
  code-quality:
    name: Code Quality

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash --noprofile --norc -euxo pipefail {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download and run renovate-config-validator
        run: |
          # Support advanced globbing patterns.
          shopt -s dotglob globstar nullglob

          # Download and run renovate-config-validator
          npx --yes --package renovate@latest -- renovate-config-validator --strict \
            ./*.json \
            ./*.json5
